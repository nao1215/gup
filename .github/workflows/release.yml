name: Release

on:
  push:
    tags:
      - "v*"

# id-token: keyless cosign signing + provenance via GitHub OIDC.
# attestations: publish build provenance for the release artifacts.
# contents: create the GitHub Release and upload assets.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0
      - name: Build artifacts for smoke test (snapshot, no publish)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean --skip=publish,sign,sbom
      - name: Smoke-test artifacts before publishing
        run: ./scripts/smoke_artifacts.sh dist
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.apk
            dist/checksums.txt

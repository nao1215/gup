version: 2
project_name: gup
env:
  - GO111MODULE=on
before:
  hooks:
    - go mod tidy
    - go generate ./...
    - ./scripts/completions.sh
builds:
  - main: .
    ldflags:
      - -s -w -X github.com/nao1215/gup/internal/cmdinfo.Version=v{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
    - completions/*
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
# Curated release notes: a short human summary first, then changes grouped by
# user-facing category (instead of a raw commit dump). See issue #283.
release:
  header: |
    ## gup {{ .Tag }}

    Fast parallel updater and manager for binaries installed with `go install`.

    Install or upgrade, then see the grouped highlights below. Every artifact is
    signed and ships with an SBOM and build provenance — see
    [Verifying release integrity](https://github.com/nao1215/gup#verifying-release-integrity).
  footer: |
    **Full changelog**: https://github.com/nao1215/gup/compare/{{ .PreviousTag }}...{{ .Tag }}
changelog:
  sort: asc
  use: github
  groups:
    - title: "Breaking changes"
      regexp: '^.*?[a-zA-Z]+(\(.+\))??!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 1
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 2
    - title: "Performance"
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 3
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: "Others"
      order: 999
  filters:
    exclude:
      - "^tests?(\\(.+\\))?!?:"
      - "^chore(\\(.+\\))?!?:"
      - "^style(\\(.+\\))?!?:"
      - "^ci(\\(.+\\))?!?:"
      - "Merge pull request"
      - "Merge branch"
# Software Bill of Materials for every release archive (issue #285).
sboms:
  - artifacts: archive
# Keyless artifact signing with cosign. Signing the checksums file transitively
# covers every published artifact (issue #285).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
nfpms:
  - maintainer: 'Naohiro CHIKAMATSU <n.chika156@gmail.com>'
    description: 'Fast manager for Go-installed binaries in $GOBIN: update, export/import, and migrate toolsets across machines'
    homepage: https://github.com/nao1215/gup
    license: Apache License 2.0
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: ./completions/gup.bash
        dst: /usr/share/bash-completion/completions/gup
        file_info:
          mode: 0644
      - src: ./completions/gup.fish
        dst: /usr/share/fish/vendor_completions.d/gup.fish
        file_info:
          mode: 0644
      - src: ./completions/gup.zsh
        dst: /usr/share/zsh/vendor-completions/_gup
        file_info:
          mode: 0644
brews:
  - name: gup
    description: 'Fast manager for Go-installed binaries in $GOBIN: update, export/import, and migrate toolsets across machines'
    license: Apache License 2.0
    repository:
      owner: nao1215
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    # Ref. https://carlosbecker.com/posts/golang-completions-cobra/
    install: |-
      bin.install "gup"
      bash_completion.install "completions/gup.bash" => "gup"
      zsh_completion.install "completions/gup.zsh" => "gup"
      fish_completion.install "completions/gup.fish"    
